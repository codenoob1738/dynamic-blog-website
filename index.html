<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FIFA 26 BLOGS</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>FIFA WORLD CUP 2026: TORONTO BLOGS</h1>

        <a href="new-post.html" class="newBlogButton">Upload New Blog</a>

        <ul id="postList"></ul>

    </div>

    <script>

        const posts = JSON.parse(localStorage.getItem("blogPosts") || "[]");

        const list = document.getElementById("postList");

        if (posts.length === 0) {

            list.innerHTML = "<li class='empty'>No new blogs.</li>";

        } else {

            for (var i = 0; i < posts.length; i++) {

                var post = posts[i];

                var blogPost = document.createElement("li");
                blogPost.className = "post";

                blogPost.innerHTML = `
                <h2>${post.title}</h2>
                ${post.image ? `<img src="${post.image}" class="blogImage">` : ""}
                <p>${post.content}</p>
                <p class="date">Date Posted: ${new Date(post.date).toLocaleDateString()}</p>
                <button class="editButton" data-id="${post.id}">Edit Blog</button>
                `;

                list.appendChild(blogPost);
            }

        }

        document.querySelectorAll('.editButton').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = btn.dataset.id;
                window.location.href = `post.html?id=${id}`;
            });
        });

    </script>

</body>

</html>
